<template>
    <div class="image-widget-root" style={rootStyle}>
        <template lwc:if={widget.title}>
            <div class="image-widget__title">{widget.title}</div>
        </template>
        <template lwc:if={hasImage}>
            <img class="image-widget__img" src={widget.imageUrl} alt={widget.title} />
        </template>
        <template lwc:if={noImage}>
            <div class="image-widget__empty slds-align_absolute-center">
                <lightning-icon icon-name="utility:image" size="large" alternative-text="이미지 없음"></lightning-icon>
                <p class="slds-m-top_small slds-text-color_weak">이미지 URL을 설정하세요</p>
            </div>
        </template>
    </div>
</template>
