<template>
    <div class="text-widget-root" style={rootStyle}>
        <template lwc:if={widget.title}>
            <h2 class="text-widget__title" style={titleStyle}>{widget.title}</h2>
        </template>
        <div class="text-widget__body" style={bodyStyle}>
            <!-- rich text content (HTML 허용) -->
            <!-- eslint-disable-next-line @lwc/lwc/no-inner-html -->
            <lightning-formatted-rich-text value={widget.content}></lightning-formatted-rich-text>
        </div>
    </div>
</template>
