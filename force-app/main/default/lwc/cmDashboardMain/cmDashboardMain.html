<template>
    <div class="dashboard-root">

        <!-- 툴바 -->
        <div class="dashboard-toolbar">
            <div class="dashboard-toolbar__left">
                <h1 class="dashboard-title slds-text-heading_medium">
                    <lightning-icon icon-name="standard:dashboard" size="small" class="slds-m-right_x-small"></lightning-icon>
                    {labels.title}
                </h1>
            </div>
            <div class="dashboard-toolbar__right">
                <lightning-button
                    label={labels.btnEdit}
                    icon-name="utility:edit"
                    variant="brand"
                    onclick={handleOpenEditModal}>
                </lightning-button>
            </div>
        </div>

        <!-- 로딩 -->
        <template lwc:if={isLoading}>
            <div class="dashboard-spinner-container">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- 에러 -->
        <template lwc:if={hasError}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-around_small" role="alert">
                <lightning-icon icon-name="utility:error" alternative-text="Error" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                {errorMessage}
            </div>
        </template>

        <!-- 대시보드 그리드 -->
        <template lwc:if={isReady}>
            <c-cm-dashboard-grid
                widgets={widgets}
                mode="DEFAULT"
                columns={columns}
                onwidgetresize={handleWidgetResize}
                onwidgetmove={handleWidgetMove}
                onwidgetdelete={handleWidgetDelete}
                onwidgetedit={handleWidgetEdit}>
            </c-cm-dashboard-grid>
        </template>

        <!-- 편집 모달 (전체화면) -->
        <template lwc:if={isEditModalOpen}>
            <c-cm-dashboard-edit-modal
                initial-widgets={widgets}
                available-components={availableComponents}
                ondashboardsave={handleEditModalSave}
                ondashboardcancel={handleEditModalCancel}>
            </c-cm-dashboard-edit-modal>
        </template>

    </div>
</template>
