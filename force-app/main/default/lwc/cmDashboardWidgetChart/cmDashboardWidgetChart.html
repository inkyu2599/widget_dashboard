<!--************************************************************************************
 * Component  : cmDashboardWidgetChart
 * Description: [영업포털-대시보드] 차트 위젯 - Chart.js 기반 집계 차트
 ************************************************************************************-->
<template>
    <div class="chart-widget">
        <template lwc:if={isLoading}>
            <div class="chart-state">
                <lightning-spinner alternative-text="로딩 중" size="medium"></lightning-spinner>
            </div>
        </template>
        <template lwc:elseif={hasError}>
            <div class="chart-state chart-state--error">
                <lightning-icon icon-name="utility:error" size="small"
                    alternative-text="오류" variant="error">
                </lightning-icon>
                <p class="state-text">{errorMessage}</p>
            </div>
        </template>
        <template lwc:elseif={isConfigured}>
            <div class="chart-container">
                <canvas lwc:ref="canvas"></canvas>
            </div>
        </template>
        <template lwc:else>
            <div class="chart-state">
                <lightning-icon icon-name="utility:chart" size="large"
                    alternative-text="차트" class="placeholder-icon">
                </lightning-icon>
                <p class="state-text">설정에서 오브젝트와 그룹 필드를 입력하세요</p>
            </div>
        </template>
    </div>
</template>
