<!--************************************************************************************
 * Component  : cmDashboardWidgetTable
 * Description: [영업포털-대시보드] 테이블 위젯 - 오브젝트 기반 커스텀 데이터 테이블
 ************************************************************************************-->
<template>
    <div class="table-widget">
        <template lwc:if={isLoading}>
            <div class="table-state">
                <lightning-spinner alternative-text="로딩 중" size="medium"></lightning-spinner>
            </div>
        </template>
        <template lwc:elseif={hasError}>
            <div class="table-state table-state--error">
                <lightning-icon icon-name="utility:error" size="small"
                    alternative-text="오류" variant="error">
                </lightning-icon>
                <p class="state-text">{errorMessage}</p>
            </div>
        </template>
        <template lwc:elseif={isConfigured}>
            <div class="table-container">
                <lightning-datatable
                    key-field="Id"
                    data={tableRows}
                    columns={tableColumns}
                    hide-checkbox-column
                    resize-column-disabled>
                </lightning-datatable>
            </div>
        </template>
        <template lwc:else>
            <div class="table-state">
                <lightning-icon icon-name="utility:table" size="large"
                    alternative-text="테이블" class="placeholder-icon">
                </lightning-icon>
                <p class="state-text">설정에서 오브젝트와 필드를 입력하세요</p>
            </div>
        </template>
    </div>
</template>
