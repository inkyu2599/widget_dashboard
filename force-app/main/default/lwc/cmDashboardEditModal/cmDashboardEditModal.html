<!--************************************************************************************
 * Component  : cmDashboardEditModal
 * Description: [영업포털-대시보드] 편집 모달 (SLDS 준수)
 ************************************************************************************-->
<template>
    <!-- 편집 모달 전체화면 -->
    <section role="dialog" aria-modal="true" aria-label="대시보드 편집"
             class="slds-modal slds-fade-in-open slds-modal_large">
        <div class="slds-modal__container edit-modal__container">

            <!-- 헤더 -->
            <header class="slds-modal__header edit-modal__header">
                <div class="slds-media slds-media_center">
                    <div class="slds-media__figure">
                        <lightning-icon icon-name="utility:layout" size="small"
                            alternative-text="편집" class="slds-m-right_x-small"></lightning-icon>
                    </div>
                    <div class="slds-media__body">
                        <h2 class="slds-modal__title slds-hyphenate">대시보드 편집</h2>
                        <p class="slds-text-body_small slds-text-color_inverse-weak">
                            드래그 앤 드롭으로 위젯을 배치하세요
                        </p>
                    </div>
                </div>
                <div class="slds-modal__header-actions">
                    <lightning-button label="취소" onclick={handleCancel}
                        class="slds-m-right_x-small"></lightning-button>
                    <lightning-button label="저장" variant="brand"
                        icon-name="utility:save" onclick={handleSave}></lightning-button>
                </div>
            </header>

            <!-- 바디 (좌우 분할) -->
            <div class="slds-modal__content edit-modal__body">

                <!-- ══ 좌측: 캔버스 패널 ══ -->
                <div class="edit-modal__canvas-panel">
                    <div class="edit-modal__panel-header slds-p-around_small
                                slds-border_bottom slds-theme_shade">
                        <span class="slds-text-title_caps slds-text-color_weak">대시보드 캔버스</span>
                        <span class="slds-badge slds-m-left_x-small">{widgetCount}개 위젯</span>
                        <span class="slds-text-body_small slds-text-color_weak slds-m-left_small">
                            ⤡ 핸들로 크기 조절 · 드래그로 위치 변경
                        </span>
                    </div>

                    <div class="edit-modal__canvas-scroll">
                        <div class={canvasClass}
                             data-canvas="true"
                             ondragover={handleCanvasDragOver}
                             ondrop={handleCanvasDrop}
                             ondragleave={handleCanvasDragLeave}>

                            <!-- 그리드 컬럼 가이드 (드래그 중에만 표시) -->
                            <template lwc:if={isDragOverCanvas}>
                                <template for:each={gridGuideColumns} for:item="col">
                                    <div key={col.key} class="canvas-grid__guide-col" style={col.style}></div>
                                </template>
                            </template>

                            <!-- 드롭 프리뷰 셀 -->
                            <template lwc:if={dropPreview}>
                                <div class="canvas-grid__drop-preview" style={dropPreview.style}></div>
                            </template>

                            <!-- 배치된 위젯들 -->
                            <template for:each={canvasWidgets} for:item="widget">
                                <div key={widget.widgetId}
                                     class={widget.cardClass}
                                     style={widget.cardStyle}
                                     data-widget-id={widget.widgetId}
                                     draggable="true"
                                     ondragstart={handleWidgetDragStart}
                                     ondragend={handleWidgetDragEnd}>

                                    <!-- 위젯 헤더 -->
                                    <div class="slds-card__header slds-grid widget-card__header">
                                        <div class="slds-media slds-media_center slds-has-flexi-truncate">
                                            <div class="slds-media__figure slds-media__figure_fixed-width">
                                                <span class={widget.badgeClass}>{widget.typeBadge}</span>
                                            </div>
                                            <div class="slds-media__body">
                                                <span class="slds-card__header-title">
                                                    <span class="slds-text-heading_small slds-truncate"
                                                          title={widget.title}>{widget.title}</span>
                                                </span>
                                            </div>
                                        </div>
                                        <div class="slds-no-flex">
                                            <lightning-button-icon
                                                icon-name="utility:settings"
                                                variant="bare"
                                                size="small"
                                                alternative-text="설정"
                                                title="위젯 설정"
                                                data-widget-id={widget.widgetId}
                                                onclick={handleWidgetSettings}>
                                            </lightning-button-icon>
                                            <template lwc:if={widget.isDeletable}>
                                                <lightning-button-icon
                                                    icon-name="utility:close"
                                                    variant="bare"
                                                    size="small"
                                                    alternative-text="삭제"
                                                    title="삭제"
                                                    data-widget-id={widget.widgetId}
                                                    onclick={handleWidgetDelete}>
                                                </lightning-button-icon>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- 미리보기 바디 -->
                                    <div class="widget-card__preview">
                                        <template lwc:if={widget.isText}>
                                            <p class="slds-text-body_small widget-preview__text"
                                               style={widget.previewTextStyle}>{widget.previewContent}</p>
                                        </template>
                                        <template lwc:if={widget.isImage}>
                                            <template lwc:if={widget.imageUrl}>
                                                <img class="widget-preview__image"
                                                     src={widget.imageUrl} alt={widget.title} />
                                            </template>
                                            <template lwc:if={widget.noImage}>
                                                <div class="widget-preview__placeholder">
                                                    <lightning-icon icon-name="utility:image"
                                                        size="medium" alternative-text="이미지"></lightning-icon>
                                                    <span class="slds-text-body_small slds-text-color_weak
                                                                 slds-m-top_xx-small">이미지 URL 미설정</span>
                                                </div>
                                            </template>
                                        </template>
                                        <template lwc:if={widget.isComponent}>
                                            <div class="widget-preview__component">
                                                <lightning-icon icon-name="utility:apex"
                                                    size="medium" alternative-text="컴포넌트"></lightning-icon>
                                                <span class="slds-text-body_small slds-text-color_weak
                                                             slds-m-top_xx-small">{widget.componentName}</span>
                                            </div>
                                        </template>
                                    </div>

                                    <!-- 리사이즈 핸들 -->
                                    <div class="widget-card__resize-handle"
                                         data-widget-id={widget.widgetId}
                                         onmousedown={handleResizeStart}
                                         title="크기 조절">
                                        <lightning-icon icon-name="utility:resize"
                                            size="xx-small" alternative-text="크기조절"></lightning-icon>
                                    </div>
                                </div>
                            </template>

                            <!-- 빈 캔버스 -->
                            <template lwc:if={isCanvasEmpty}>
                                <div class="canvas-empty">
                                    <lightning-icon icon-name="utility:add"
                                        size="large" alternative-text="추가"></lightning-icon>
                                    <p class="slds-text-heading_small slds-m-top_small">캔버스가 비어 있습니다</p>
                                    <p class="slds-text-body_regular slds-text-color_weak slds-m-top_xx-small">
                                        우측 패널에서 위젯을 드래그하여 놓으세요
                                    </p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <!-- ══ 우측: 팔레트 패널 ══ -->
                <div class="edit-modal__palette-panel">
                    <div class="edit-modal__panel-header slds-p-around_small
                                slds-border_bottom slds-theme_shade">
                        <span class="slds-text-title_caps slds-text-color_weak">위젯 팔레트</span>
                        <span class="slds-text-body_small slds-text-color_weak slds-m-left_small">
                            드래그하여 캔버스에 추가
                        </span>
                    </div>

                    <!-- 검색 -->
                    <div class="slds-p-around_x-small slds-border_bottom">
                        <lightning-input
                            type="search"
                            label="위젯 검색"
                            variant="label-hidden"
                            placeholder="위젯 검색..."
                            value={searchKeyword}
                            onchange={handleSearchChange}>
                        </lightning-input>
                    </div>

                    <div class="edit-modal__palette-scroll">
                        <!-- 기본 위젯 섹션 -->
                        <div class="slds-p-top_x-small">
                            <p class="slds-text-title_caps slds-text-color_weak
                                      slds-p-horizontal_small slds-p-vertical_xx-small">기본 위젯</p>
                            <template for:each={basicPaletteItems} for:item="item">
                                <div key={item.id}
                                     class="palette-item slds-media slds-media_center
                                            slds-p-around_x-small slds-m-horizontal_xx-small"
                                     draggable="true"
                                     data-palette-id={item.id}
                                     data-widget-type={item.widgetType}
                                     ondragstart={handlePaletteDragStart}
                                     ondragend={handlePaletteDragEnd}>
                                    <div class="slds-media__figure">
                                        <span class="palette-item__icon">{item.icon}</span>
                                    </div>
                                    <div class="slds-media__body">
                                        <p class="slds-text-body_regular slds-text-color_default">{item.name}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">{item.desc}</p>
                                    </div>
                                    <div class="slds-no-flex palette-item__drag-grip">
                                        <lightning-icon icon-name="utility:drag_and_drop"
                                            size="x-small" alternative-text="드래그"></lightning-icon>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- 컴포넌트 위젯 섹션 -->
                        <div class="slds-p-top_small slds-border_top">
                            <p class="slds-text-title_caps slds-text-color_weak
                                      slds-p-horizontal_small slds-p-vertical_xx-small">컴포넌트 위젯</p>
                            <template for:each={filteredComponentItems} for:item="item">
                                <div key={item.id}
                                     class="palette-item palette-item--component slds-media slds-media_center
                                            slds-p-around_x-small slds-m-horizontal_xx-small"
                                     draggable="true"
                                     data-palette-id={item.id}
                                     data-widget-type="COMPONENT"
                                     data-component-name={item.componentName}
                                     ondragstart={handlePaletteDragStart}
                                     ondragend={handlePaletteDragEnd}>
                                    <div class="slds-media__figure">
                                        <span class="palette-item__icon">{item.icon}</span>
                                    </div>
                                    <div class="slds-media__body">
                                        <p class="slds-text-body_regular slds-text-color_default">{item.name}</p>
                                        <p class="slds-text-body_small slds-text-color_weak">{item.desc}</p>
                                        <span class="slds-badge slds-badge_lightest slds-m-top_xx-small">{item.category}</span>
                                    </div>
                                    <div class="slds-no-flex palette-item__drag-grip">
                                        <lightning-icon icon-name="utility:drag_and_drop"
                                            size="x-small" alternative-text="드래그"></lightning-icon>
                                    </div>
                                </div>
                            </template>
                            <template lwc:if={noComponentResults}>
                                <div class="slds-align_absolute-center slds-p-around_medium">
                                    <p class="slds-text-body_small slds-text-color_weak">검색 결과가 없습니다</p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

            </div><!-- /modal__content -->
        </div><!-- /modal__container -->
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>

    <!-- ══ 위젯 설정 팝업 (서브 컴포넌트) ══ -->
    <template lwc:if={isSettingsOpen}>
        <c-cm-dashboard-widget-settings
            draft={settingsDraft}
            available-component-options={availableComponentOptions}
            onfieldchange={handleSettingsFieldChange}
            onsettingssave={handleSettingsSave}
            onsettingscancel={handleSettingsCancel}>
        </c-cm-dashboard-widget-settings>
    </template>

</template>
