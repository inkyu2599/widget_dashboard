<!--************************************************************************************
 * Component  : cmDashboardWidgetReport
 * Description: [영업포털-대시보드] 리포트 위젯 - Salesforce 리포트 iframe 임베드
 ************************************************************************************-->
<template>
    <div class="report-widget">
        <template lwc:if={hasReport}>
            <iframe
                src={reportUrl}
                class="report-frame"
                title="Salesforce Report"
                frameborder="0">
            </iframe>
        </template>
        <template lwc:else>
            <div class="report-placeholder">
                <lightning-icon icon-name="utility:metrics" size="large"
                    alternative-text="리포트" class="placeholder-icon">
                </lightning-icon>
                <p class="placeholder-text">설정에서 리포트 ID를 입력하세요</p>
            </div>
        </template>
    </div>
</template>
