<!--************************************************************************************
 * Component  : cmDashboardGrid
 * Author     : Dashboard Team
 * Date       : 2026-03-06
 * Description: [영업포털-대시보드] CSS Grid 기반 위젯 레이아웃 컨테이너
 ************************************************************************************-->
<template>
    <div class="dashboard-grid-wrapper slds-p-around_small">

        <!-- 편집 모드 안내 배너 -->
        <template lwc:if={isEditMode}>
            <div class="edit-mode-banner slds-m-bottom_small">
                <lightning-icon icon-name="utility:info" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                위젯 툴바를 드래그하여 이동 | 우측 하단 핸들을 드래그하여 크기 조절
            </div>
        </template>

        <!-- 위젯 없을 때 빈 상태 -->
        <template lwc:if={isEmpty}>
            <div class="empty-state">
                <div class="empty-state__body">
                    <lightning-icon icon-name="utility:layout" size="large" class="slds-m-bottom_medium"></lightning-icon>
                    <p class="slds-text-heading_small slds-m-bottom_small">대시보드가 비어 있습니다</p>
                    <p class="slds-text-body_regular slds-text-color_weak">
                        편집 모드에서 [위젯 추가] 버튼을 눌러 텍스트 · 이미지 · 컴포넌트 위젯을 추가하세요.
                    </p>
                </div>
            </div>
        </template>

        <!-- CSS Grid 컨테이너 -->
        <div class="dashboard-grid" style={gridStyle}>
            <template for:each={widgets} for:item="widget">
                <c-cm-dashboard-widget
                    key={widget.widgetId}
                    widget={widget}
                    mode={mode}
                    columns={columns}
                    onwidgetresize={handleWidgetResize}
                    onwidgetmove={handleWidgetMove}
                    onwidgetdelete={handleWidgetDelete}
                    onwidgetedit={handleWidgetEdit}>
                </c-cm-dashboard-widget>
            </template>
        </div>

    </div>
</template>
